apiVersion: v1
kind: Service
metadata:
  name: demo-nginx-stable
  namespace: default
  labels:
    app: demo-nginx
spec:
  selector:
    app: demo-nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: demo-nginx-canary
  namespace: default
  labels:
    app: demo-nginx
spec:
  selector:
    app: demo-nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP
